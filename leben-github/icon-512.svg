<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="100" fill="url(#bg)"/>
  <!-- German flag stripes -->
  <rect x="40" y="346" width="432" height="58" rx="10" fill="#222222"/>
  <rect x="40" y="404" width="432" height="58" rx="10" fill="#dd0000"/>
  <rect x="40" y="462" width="432" height="42" rx="10" fill="#ffce00"/>
  <!-- Main card -->
  <rect x="40" y="40" width="432" height="294" rx="40" fill="rgba(108,99,255,0.12)"/>
  <rect x="40" y="40" width="432" height="294" rx="40" fill="none" stroke="rgba(108,99,255,0.3)" stroke-width="2"/>
  <!-- DE text -->
  <text x="256" y="168" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="120" font-weight="900" fill="#6c63ff">DE</text>
  <!-- 310 Fragen badge -->
  <rect x="116" y="208" width="280" height="80" rx="40" fill="#6c63ff"/>
  <text x="256" y="258" text-anchor="middle" font-family="Arial, sans-serif" font-size="36" font-weight="700" fill="white">310 Fragen</text>
</svg>
